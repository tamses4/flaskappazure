# ================================================================
# nginx-frontend.conf
# Config Nginx pour le frontend
# Copier dans : /etc/nginx/sites-available/monapp
# Puis : ln -s /etc/nginx/sites-available/monapp /etc/nginx/sites-enabled/
# ================================================================

upstream backend_pool {
    server 10.0.2.10:5000;  # IP du Load Balancer interne backend
}

server {
    listen 80;
    server_name _;

    root /var/www/html;
    index index.html;

    # Fichiers statiques frontend
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy vers le backend via LB interne (port 5000)
    location /api/ {
        proxy_pass http://backend_pool;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
    }

    # Health check endpoint pour le Load Balancer public
    location /health {
        return 200 'OK';
        add_header Content-Type text/plain;
    }
}
