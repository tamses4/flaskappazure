# =============================================================
# /etc/nginx/sites-available/monapp
# Config Nginx - Sert le frontend et proxifie vers le backend
# Copier vers /etc/nginx/sites-enabled/monapp
# =============================================================

server {
    listen 80;
    server_name _;

    root /var/www/html;
    index index.html;

    # ── Fichiers statiques frontend ───────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
        expires 1h;
        add_header Cache-Control "public, immutable";
    }

    # ── Proxy vers le backend (port 5000 via LB interne) ──────
    location /api/ {
        proxy_pass         http://10.0.2.10:5000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;
    }

    # ── Health check du frontend (pour le LB public) ──────────
    location /health {
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # ── Logs ──────────────────────────────────────────────────
    access_log /var/log/nginx/monapp-access.log;
    error_log  /var/log/nginx/monapp-error.log;
}
